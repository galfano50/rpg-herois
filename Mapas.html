<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapas</title>
  <link rel="stylesheet" href="css/mapas.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=Pirata+One&display=swap" rel="stylesheet">
</head>
<body>
  <h1>Mapas do RPG</h1>

  <!-- Dropdown para seleção de mapa -->
  <label for="mapaSelect">Escolha um mapa:</label>
  <select id="mapaSelect">
    <option value="">Selecione um mapa</option>
    <option value="africa">África</option>
    <option value="america">América</option>
    <option value="asia">Ásia</option>
    <option value="estados-unidos">Estados Unidos</option>
    <option value="europa">Europa</option>
    <option value="oceania">Oceania</option>   
    <option value="romenia">Romênia</option>
    <option value="italia">Itália</option>
    <option value="atlantida">Atlântida</option>
    <option value="aurorium">Aurorium</option>
    <option value="moinho">Moinho dos Dez Ventos</option>
    <option value="temiscera">Temíscera</option>
    <option value="ventobravo">Ventobravo</option>
    <option value="voragor">Voragor</option>
    <option value="vulkran">Vulkran</option>
    <option value="arcanum">Arcanum</option>
    <option value="sauria">Sauria Prime</option>
    <option value="umbrafall">Umbrafall</option>
    <option value="pandemonio">Pandemônio</option>
  </select>

  <div id="mapaContainer" style="margin-top: 20px;">
    <!-- A imagem será exibida aqui -->
  </div>

  <script src="java/mapas.js"></script>
</body>
</html>
