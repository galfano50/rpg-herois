<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ala do Mestre</title>
    <link rel="stylesheet" href="css/alamestre.css">
    <script type="module" src="js/ala-mestre2.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English+SC&display=swap');

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#b8aca0;

            font-family:'IM Fell English SC',serif;

            color:#4a2f16;

            padding:20px;

        }


        /*=========================================
                    CONTAINER
        =========================================*/

        .mestre-container{

            max-width:1800px;

            margin:auto;

        }


        /*=========================================
                        TOPO
        =========================================*/

        .mestre-topo{

            display:flex;

            justify-content:space-between;

            align-items:center;

            gap:20px;

            flex-wrap:wrap;

            padding:20px;

            background:#d8d0ca;

            border:3px solid #8a6a47;

            border-radius:12px;

            margin-bottom:20px;

        }

        .mestre-topo h1{

            font-family:'Pirata One',cursive;

            font-size:40px;

            color:#5b3a1a;

        }

        .mestre-topo p{

            margin-top:6px;

            color:#6d4a29;

        }


        /*=========================================
                    BOTÕES
        =========================================*/

        .mestre-acoes{

            display:flex;

            gap:10px;

            flex-wrap:wrap;

        }

        .mestre-acoes button{

            border:none;

            cursor:pointer;

            padding:10px 18px;

            border-radius:8px;

            background:#6b4b2c;

            color:white;

            font-size:15px;

            transition:.25s;

        }

        .mestre-acoes button:hover{

            background:#52351b;

        }


        /*=========================================
                    RESUMO
        =========================================*/

        .mestre-resumo{

            display:grid;

            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

            gap:15px;

            margin-bottom:20px;

        }

        .resumo-card{

            background:#d8d0ca;

            border:2px solid #8a6a47;

            border-radius:10px;

            padding:15px;

            text-align:center;

        }

        .resumo-card span{

            display:block;

            font-size:15px;

        }

        .resumo-card strong{

            display:block;

            margin-top:8px;

            font-size:28px;

            color:#5b3a1a;

        }


        /*=========================================
                    FILTROS
        =========================================*/

        .mestre-filtros{

            display:grid;

            grid-template-columns:2fr 1fr 1fr 1fr;

            gap:12px;

            margin-bottom:25px;

        }

        .mestre-filtros input,
        .mestre-filtros select{

            height:42px;

            border:2px solid #8a6a47;

            border-radius:8px;

            background:#f8f5f1;

            padding:0 10px;

            font-family:'IM Fell English SC';

        }


        /*=========================================
                    CARDS
        =========================================*/

        .grade-fichas{

            display:grid;

            grid-template-columns:
                repeat(auto-fill,minmax(360px,1fr));

            gap:18px;

        }


        /*=========================================
                    PERSONAGEM
        =========================================*/

        .card-personagem{

            background:#ddd5cf;

            border:2px solid #8a6a47;

            border-radius:12px;

            padding:18px;

            transition:.25s;

        }

        .card-personagem:hover{

            transform:translateY(-4px);

            box-shadow:0 8px 18px rgba(0,0,0,.20);

        }


        .titulo-card{

            font-family:'Pirata One';

            font-size:30px;

            color:#5b3a1a;

            text-align:center;

        }

        .subtitulo-card{

            text-align:center;

            margin-bottom:15px;

            color:#7b5632;

        }


        .linha-card{

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding:6px 0;

            border-bottom:1px dotted #8a6a47;

        }

        .linha-card strong{

            color:#5b3a1a;

        }


        .pequena{

            justify-content:center;

            font-size:13px;

            border:none;

            margin-top:8px;

        }


        /*=========================================
                    BOTÕES DOS CARDS
        =========================================*/

        .acoes-card{

            display:flex;

            gap:8px;

            margin-top:18px;

        }

        .botao-card{

            flex:1;

            border:none;

            border-radius:8px;

            cursor:pointer;

            background:#6b4b2c;

            color:white;

            padding:8px;

            transition:.2s;

        }

        .botao-card:hover{

            background:#52351b;

        }

        .perigo{

            background:#8f2d2d;

        }

        .perigo:hover{

            background:#6d1d1d;

        }


        /*=========================================
                    MODAL
        =========================================*/

        .modal-resumo{

            position:fixed;

            inset:0;

            background:rgba(0,0,0,.65);

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;

            z-index:999;

        }

        .modal-conteudo{

            background:#d8d0ca;

            border:3px solid #8a6a47;

            border-radius:12px;

            width:100%;

            max-width:1200px;

            max-height:90vh;

            overflow:auto;

            padding:25px;

            position:relative;

        }


        .fechar-modal{

            position:absolute;

            top:12px;

            right:12px;

            width:40px;

            height:40px;

            border:none;

            border-radius:50%;

            cursor:pointer;

            background:#8f2d2d;

            color:white;

        }


        /*=========================================
                    RESUMO
        =========================================*/

        .titulo-resumo{

            font-family:'Pirata One';

            text-align:center;

            font-size:40px;

            color:#5b3a1a;

            margin-bottom:5px;

        }

        .subtitulo-resumo{

            text-align:center;

            margin-bottom:20px;

        }

        .secao-resumo{

            background:#ece7e2;

            border:2px solid #8a6a47;

            border-radius:8px;

            padding:15px;

            margin-bottom:18px;

        }

        .secao-resumo h3{

            font-family:'Pirata One';

            color:#5b3a1a;

            margin-bottom:10px;

        }

        .grid-resumo{

            display:grid;

            grid-template-columns:
                repeat(auto-fit,minmax(180px,1fr));

            gap:8px;

        }

        .grid-resumo div{

            display:flex;

            justify-content:space-between;

            padding:5px;

            border-bottom:1px dotted #8a6a47;

        }


        /*=========================================
                    ESTADOS
        =========================================*/

        .estado-mestre{

            text-align:center;

            padding:40px;

            background:#ddd5cf;

            border:2px dashed #8a6a47;

            border-radius:10px;

            margin-bottom:20px;

        }


        /*=========================================
                    RESPONSIVO
        =========================================*/

        @media(max-width:1000px){

            .mestre-filtros{

                grid-template-columns:1fr;

            }

            .mestre-topo{

                flex-direction:column;

                text-align:center;

            }

            .acoes-card{

                flex-direction:column;

            }

        }
    </style>
</head>
<body>
    <div class="mestre-container">

        <header class="mestre-topo">

            <div>

                <h1>⚜ Ala do Mestre</h1>

                <p>Biblioteca de personagens salvos</p>

            </div>

            <div class="mestre-acoes">

                <button onclick="window.location.href='home.html'">
                    🏠 Início
                </button>

                <button onclick="window.location.href='Ficha.html'">
                    📜 Nova Ficha
                </button>

                <button onclick="refreshFichas()">
                    🔄 Atualizar
                </button>

                <button onclick="logout()">
                    🚪 Sair
                </button>

            </div>

        </header>


        <section class="mestre-resumo">

            <div class="resumo-card">

                <span>Total de Fichas</span>

                <strong id="totalFichas">0</strong>

            </div>

            <div class="resumo-card">

                <span>Última Atualização</span>

                <strong id="ultimaAtualizacao">--</strong>

            </div>

        </section>


        <section class="mestre-filtros">

            <input
                type="text"
                id="pesquisaFicha"
                placeholder="Pesquisar por nome..."
                oninput="filtrarFichas()">

            <select
                id="filtroClasse"
                onchange="filtrarFichas()">

                <option value="">Todas as Classes</option>
                <option value="Mutante">Mutante</option>
                <option value="Tecnológico">Tecnológico</option>
                <option value="Científico">Científico</option>
                <option value="Místico">Místico</option>
                <option value="Cósmico">Cósmico</option>
                <option value="Lutador">Lutador</option>

            </select>

            <select
                id="filtroRaca"
                onchange="filtrarFichas()">

                <option value="">Todas as Raças</option>
                <option value="Humano">Humano</option>
                <option value="Atlântis">Atlântis</option>
                <option value="Amazonas">Amazonas</option>
                <option value="Dracônicos">Dracônicos</option>
                <option value="Vampiros">Vampiros</option>
                <option value="Lobisomem">Lobisomem</option>
                <option value="Marciano">Marciano</option>
                <option value="Tetlamando">Tetlamando</option>

            </select>

            <select
                id="ordenarPor"
                onchange="ordenarFichas()">

                <option value="data">Mais Recentes</option>
                <option value="nome">Nome</option>
                <option value="nivel">Nível</option>
                <option value="classe">Classe</option>
                <option value="raca">Raça</option>

            </select>

        </section>


        <section
            id="loadingState"
            class="estado-mestre">

            Carregando fichas...

        </section>


        <section
            id="emptyState"
            class="estado-mestre"
            style="display:none;">

            Nenhuma ficha encontrada.

        </section>


        <section
            id="listaFichas"
            class="grade-fichas">

            <!-- Cards gerados pelo JS -->

        </section>

    </div>

    <div
        id="modalResumo"
        class="modal-resumo"
        style="display:none;">

        <div class="modal-conteudo">

            <button
                class="fechar-modal"
                onclick="fecharResumo()">

                ✖

            </button>

            <div id="conteudoResumo"></div>

        </div>

    </div>
</body>
</html>
