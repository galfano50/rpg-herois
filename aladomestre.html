<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ala do Mestre - RPG</title>
    <script type="module" src="js/firebase-config2.js"></script>
    <script type="module" src="js/ala-mestre2.js"></script>
    <style>
        body{

            margin:0;
            padding:25px;

            background:#bda98a;

            font-family:"IM Fell English SC",serif;

            color:#4a2f16;

        }

        .topo-mestre{

            display:flex;

            justify-content:space-between;

            align-items:center;

            gap:20px;

            flex-wrap:wrap;

            background:#cec6c0;

            border:4px solid #7b5a38;

            border-radius:15px;

            padding:20px;

            margin-bottom:25px;

            box-shadow:0 0 15px rgba(0,0,0,.25);

        }

        .titulo-topo{

            font-family:"Pirata One",cursive;

            font-size:42px;

            color:#5b3a1a;

            letter-spacing:2px;

        }

        .acoes-topo{

            display:flex;

            gap:10px;

            flex-wrap:wrap;

        }

        .acoes-topo button{

            background:#7b5a38;

            color:white;

            border:none;

            padding:10px 20px;

            border-radius:8px;

            cursor:pointer;

            font-size:17px;

            transition:.25s;

        }

        .acoes-topo button:hover{

            background:#5b3a1a;

        }

        .painel-superior{

            display:flex;

            gap:20px;

            margin-bottom:20px;

            flex-wrap:wrap;

        }

        .estatistica{

            flex:1;

            min-width:220px;

            background:#cec6c0;

            border:3px solid #7b5a38;

            border-radius:12px;

            padding:20px;

            text-align:center;

        }

        .estatistica span{

            display:block;

            font-size:18px;

        }

        .estatistica strong{

            display:block;

            margin-top:10px;

            font-size:34px;

            color:#6b4b2c;

        }

        .barra-pesquisa{

            display:flex;

            gap:15px;

            margin-bottom:20px;

            flex-wrap:wrap;

        }

        .barra-pesquisa input,
        .barra-pesquisa select{

            flex:1;

            padding:12px;

            border:2px solid #7b5a38;

            border-radius:8px;

            background:#f4efe9;

            font-size:18px;

            font-family:"IM Fell English SC",serif;

        }

        .filtros{

            display:flex;

            flex-wrap:wrap;

            gap:10px;

            margin-bottom:30px;

        }

        .filtros button{

            background:#7b5a38;

            color:white;

            border:none;

            padding:10px 18px;

            border-radius:8px;

            cursor:pointer;

            transition:.2s;

        }

        .filtros button:hover{

            background:#5b3a1a;

        }

        grade-fichas{

            display:grid;

            grid-template-columns:repeat(auto-fit,minmax(360px,1fr));

            gap:25px;

        }

        .card-ficha{

            background:#cec6c0;

            border:4px solid #7b5a38;

            border-radius:15px;

            padding:20px;

            box-shadow:0 0 15px rgba(0,0,0,.18);

        }

        .card-ficha h2{

            font-family:"Pirata One";

            text-align:center;

            color:#5b3a1a;

            font-size:34px;

            margin-bottom:15px;

        }

        .info-linha{

            display:flex;

            justify-content:space-between;

            border-bottom:1px dashed #8a6a48;

            padding:6px 0;

            font-size:18px;

        }

        .info-linha strong{

            color:#5b3a1a;

        }

        .botoes-card{

            display:flex;

            gap:10px;

            margin-top:20px;

            flex-wrap:wrap;

        }

        .botoes-card button{

            flex:1;

            padding:10px;

            border:none;

            border-radius:8px;

            cursor:pointer;

            font-size:17px;

            transition:.25s;

        }

        .btn-abrir{

            background:#6b8e23;

            color:white;

        }

        .btn-resumo{

            background:#3b6ea5;

            color:white;

        }

        .btn-excluir{

            background:#9d2f2f;

            color:white;

        }

        .btn-abrir:hover{

            background:#55711b;

        }

        .btn-resumo:hover{

            background:#305986;

        }

        .btn-excluir:hover{

            background:#7f2525;

        }

        .estado{

            text-align:center;

            padding:40px;

            font-size:24px;

            background:#cec6c0;

            border:3px dashed #7b5a38;

            border-radius:12px;

            margin-bottom:25px;

        }

        .janela-resumo{

            position:fixed;

            top:0;

            left:0;

            width:100%;

            height:100%;

            background:rgba(0,0,0,.65);

            display:flex;

            justify-content:center;

            align-items:center;

            z-index:9999;

        }

        .conteudo-resumo{

            background:#cec6c0;

            width:90%;

            max-width:1000px;

            max-height:90%;

            overflow:auto;

            border:5px solid #7b5a38;

            border-radius:15px;

            padding:30px;

            position:relative;

        }

        .fecharResumo{

            position:absolute;

            top:15px;

            right:15px;

            width:40px;

            height:40px;

            border:none;

            border-radius:50%;

            background:#9d2f2f;

            color:white;

            cursor:pointer;

            font-size:18px;

        }

        @media(max-width:800px){

            .topo-mestre{

                flex-direction:column;

            }

            .titulo-topo{

                text-align:center;

                font-size:34px;

            }

            .acoes-topo{

                justify-content:center;

            }

            .barra-pesquisa{

                flex-direction:column;

            }

            .grade-fichas{

                grid-template-columns:1fr;

            }

        }
    </style>
</head>
<body>
    <header class="topo-mestre">
        <div class="titulo-topo">

            ⚔ Ala do Mestre ⚔

        </div>

        <div class="acoes-topo">

            <button onclick="window.location='home.html'">
                🏠 Início
            </button>

            <button onclick="window.location='Ficha.html'">
                📜 Nova Ficha
            </button>

            <button onclick="refreshFichas()">
                🔄 Atualizar
            </button>

            <button onclick="logout()">
                🚪 Sair
            </button>

        </div>
    </header>

    <section class="painel-superior">

        <div class="estatistica">

            <span>Total de Personagens</span>

            <strong id="totalFichas">0</strong>

        </div>

        <div class="estatistica">

            <span>Última Atualização</span>

            <strong id="ultimaAtualizacao">--</strong>

        </div>

    </section>

    <section class="barra-pesquisa">

        <input
            type="text"
            id="pesquisa"
            placeholder="Pesquisar personagem..."
            onkeyup="filtrarFichas()">

        <select id="ordenacao" onchange="ordenarFichas()">

            <option value="data">
                Mais recentes
            </option>

            <option value="nome">
                Nome (A-Z)
            </option>

            <option value="nivel">
                Nível
            </option>

            <option value="classe">
                Classe
            </option>

            <option value="raca">
                Raça
            </option>

        </select>

    </section>

    <section class="filtros">

        <button onclick="filtrarClasse('')">
            Todas
        </button>

        <button onclick="filtrarClasse('Mutante')">
            Mutantes
        </button>

        <button onclick="filtrarClasse('Tecnológico')">
            Tecnológicos
        </button>

        <button onclick="filtrarClasse('Científico')">
            Científicos
        </button>

        <button onclick="filtrarClasse('Místico')">
            Místicos
        </button>

    </section>

    <div
        id="loadingState"
        class="estado">

        Carregando fichas...

    </div>

    <div
        id="emptyState"
        class="estado"
        style="display:none;">

        Nenhuma ficha encontrada.

    </div>

    <section
        id="listaFichas"
        class="grade-fichas">

    </section>

    <div
        id="janelaResumo"
        class="janela-resumo"
        style="display:none;">

        <div class="conteudo-resumo">

            <button
                class="fecharResumo"
                onclick="fecharResumo()">

                ✖

            </button>

            <div id="conteudoResumo">

            </div>

        </div>

    </div>
</body>
</html>
